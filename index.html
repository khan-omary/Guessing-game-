<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Play Number Guessing Game online. Guess a number between 1 and 20. Built with HTML, CSS, and JavaScript.">
    <meta name="keywords" content="Number Guessing Game, JavaScript Game, HTML Game, Online Game, Fun Game, Interactive Game">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="./style.css">
    <title>Game</title>
</head>
<body>

    
    <div id="full_div">
        <h1>Number Gussing Game</h1>
    
        <div id="statusArea">
            <h3>Gusse between 1-20 ... </h3>
            <p>You have 5 attempts</p>
        </div><br>

        <input type="number" id="guess-input" placeholder="Enter Number ">
        <button id="guess-button"  >Guess</button>  <!--onclick="test()"-->
        
        <div id="HistoryArea">
            <h2>Start </h2> 
            <button id="Refresh-button">Refresh</button> <br>
        </div>
        
    </div>
    
    <script src="./gussing_game.js"></script>
</body>
</html>
